name: Docker Compose API Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  compose-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build

      - name: Show running containers
        run: docker ps

      - name: Wait for services
        run: sleep 90

      - name: Check discovery-service
        run: curl -f http://localhost:8761

      - name: Check gateway root is reachable
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          echo "Gateway returned HTTP $code"
          if [ "$code" = "200" ] || [ "$code" = "404" ] || [ "$code" = "403" ]; then
            exit 0
          else
            exit 1
          fi

      - name: Check incidents route through gateway
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/incidents/)
          echo "Incidents endpoint returned HTTP $code"
          if [ "$code" = "200" ] || [ "$code" = "401" ] || [ "$code" = "403" ] || [ "$code" = "404" ]; then
            exit 0
          else
            exit 1
          fi

      - name: Check auth route through gateway
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/auth/)
          echo "Auth endpoint returned HTTP $code"
          if [ "$code" = "200" ] || [ "$code" = "401" ] || [ "$code" = "403" ] || [ "$code" = "404" ] || [ "$code" = "405" ]; then
            exit 0
          else
            exit 1
          fi

      - name: Check analytics route through gateway
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/analytics/summary)
          echo "Analytics endpoint returned HTTP $code"
          if [ "$code" = "200" ] || [ "$code" = "401" ] || [ "$code" = "403" ] || [ "$code" = "404" ]; then
            exit 0
          else
            exit 1
          fi

      - name: Show logs if failure
        if: failure()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down -v
