server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: configserver:http://config-server:8888
  cloud:
    gateway:
      default-filters:
        - PreserveHostHeader
      routes:
        - id: incident-service
          uri: http://incident-service:8081
          predicates:
            - Path=/api/incidents/**

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka
    register-with-eureka: true
    fetch-registry: true