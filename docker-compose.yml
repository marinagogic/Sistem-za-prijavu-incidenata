version: '3.8'

services:
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/app/config-repo

  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    depends_on:
      - config-server

  incident-service:
    build: ./incident-service
    container_name: incident-service
    ports:
      - "8081:8081"
    depends_on:
      - config-server
      - discovery-service

  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - config-server
      - discovery-service
      - incident-service