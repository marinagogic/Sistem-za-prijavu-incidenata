services:
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/app/config-repo
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy

  incident-db:
    image: mysql:8.0
    container_name: incident-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: incident_db
    ports:
      - "3307:3306"
    volumes:
      - incident_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  user-db:
    image: mysql:8.0
    container_name: user-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_db
    ports:
      - "3308:3306"
    volumes:
      - user_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  incident-service:
    build: ./incident-service
    container_name: incident-service
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_started
      incident-db:
        condition: service_healthy

  user-service:
    build: ./user-service
    container_name: user-service
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_started
      user-db:
        condition: service_healthy

  auth-service:
    build: ./auth-service
    container_name: auth-service
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_started
      user-service:
        condition: service_started

  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_started
      incident-service:
        condition: service_started
      user-service:
        condition: service_started
      auth-service:
        condition: service_started

volumes:
  incident_mysql_data:
  user_mysql_data: